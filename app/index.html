<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IntelliGrow - Redirecting...</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <script>
    // Simple redirect logic
    window.onload = function() {
      try {
        const userStr = localStorage.getItem('ig_user');
        if (userStr) {
          const user = JSON.parse(userStr);
          if (user) {
            // Check view role
            const role = localStorage.getItem('ig_role');
            if (role === 'manager') {
              window.location.replace('manager_dashboard.html');
            } else {
              window.location.replace('dashboard.html');
            }
            return;
          }
        }
      } catch (e) {
        // Ignore errors and fall through to login
      }
      
      // If no user found, go to login
      window.location.replace('login.html');
    };
  </script>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
  <div class="text-center">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-600 mx-auto mb-4"></div>
    <p class="text-gray-500 font-medium">Loading IntelliGrow...</p>
  </div>
</body>
</html>
