<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>intelliGrow — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f5f5f5; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
.card { background: #fff; border: 1px solid #e0e0e0; border-radius: 16px; padding: 44px 38px; width: 100%; max-width: 420px; box-shadow: 0 4px 28px rgba(0,0,0,.07); }
.logo { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; justify-content: center; }
.logo-badge { width: 36px; height: 36px; background: #1a8c6e; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: #fff; }
.logo-name { font-size: 20px; font-weight: 700; }
.logo-name span { color: #1a8c6e; }
.card-title { font-size: 21px; font-weight: 700; text-align: center; margin-bottom: 5px; }
.card-sub { font-size: 13px; color: #888; text-align: center; margin-bottom: 28px; line-height: 1.6; }
.fl { font-size: 12px; font-weight: 600; color: #555; margin-bottom: 5px; margin-top: 14px; display: block; }
.inp { width: 100%; padding: 10px 12px; border: 1px solid #d0d0d0; border-radius: 7px; font-size: 13px; font-family: Arial, sans-serif; outline: none; transition: border-color .15s; }
.inp:focus { border-color: #1a8c6e; }
select.inp { background: #fff; cursor: pointer; }
.btn { width: 100%; padding: 11px; border-radius: 8px; border: none; background: #1a8c6e; color: #fff; font-size: 14px; font-weight: 600; cursor: pointer; font-family: Arial, sans-serif; margin-top: 20px; transition: background .15s; }
.btn:hover { background: #157a5e; }
.btn:disabled { background: #b8e0d2; cursor: default; }
.switch-row { text-align: center; margin-top: 18px; font-size: 13px; color: #888; }
.lnk { background: none; border: none; color: #1a8c6e; font-size: 13px; cursor: pointer; text-decoration: underline; font-family: Arial, sans-serif; }
.alert { padding: 10px 14px; border-radius: 7px; font-size: 12px; margin-bottom: 14px; }
.alert-err { background: #fff3f3; border: 1px solid #f7c5c5; color: #d32f2f; }
.alert-ok  { background: #f0faf6; border: 1px solid #b8e0d2; color: #1a6b52; }
.hint { font-size: 11px; color: #aaa; margin-top: 4px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-badge">iG</div>
    <span class="logo-name">intelli<span>Grow</span></span>
  </div>

  <div id="alert" style="display:none" class="alert"></div>

  <!-- LOGIN -->
  <div id="mode-login">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in with your email address</div>
    <label class="fl">Email</label>
    <input id="l-email" class="inp" type="email" placeholder="you@company.com" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" id="l-btn" onclick="doLogin()">Sign in →</button>
    <div class="switch-row">No account? <button class="lnk" onclick="show('register')">Register here</button></div>
  </div>

  <!-- REGISTER -->
  <div id="mode-register" style="display:none">
    <div class="card-title">Create account</div>
    <div class="card-sub">Join intelliGrow — your AI growth platform</div>
    <label class="fl">Full name</label>
    <input id="r-name" class="inp" type="text" placeholder="Your full name">
    <label class="fl">Email</label>
    <input id="r-email" class="inp" type="email" placeholder="you@company.com">
    <label class="fl">Your role</label>
    <select id="r-role" class="inp">
      <option value="employee">Employee / Reportee</option>
      <option value="manager">Manager</option>
    </select>
    <label class="fl">Manager's email <span style="color:#aaa;font-weight:400">(leave blank if you are a manager)</span></label>
    <input id="r-mgr" class="inp" type="email" placeholder="manager@company.com">
    <div class="hint">Your manager must be registered first.</div>
    <button class="btn" id="r-btn" onclick="doRegister()">Create account →</button>
    <div class="switch-row">Have an account? <button class="lnk" onclick="show('login')">Sign in</button></div>
  </div>
</div>

<script src="/env.js"></script>
<script src="supabase.js"></script>
<script>
if (getUser()) location.href = 'role_select.html';

function showAlert(msg, type='err') {
  const el = document.getElementById('alert');
  el.className = 'alert alert-' + type;
  el.textContent = msg;
  el.style.display = 'block';
}
function hideAlert() { document.getElementById('alert').style.display = 'none'; }

function show(mode) {
  hideAlert();
  document.getElementById('mode-login').style.display    = mode === 'login'    ? '' : 'none';
  document.getElementById('mode-register').style.display = mode === 'register' ? '' : 'none';
}

async function doLogin() {
  hideAlert();
  const email = (document.getElementById('l-email').value || '').trim().toLowerCase();
  if (!email) { showAlert('Please enter your email.'); return; }
  const btn = document.getElementById('l-btn');
  btn.disabled = true; btn.textContent = 'Signing in…';

  const { data, error } = await db.from('users').select('*').eq('email', email);
  btn.disabled = false; btn.textContent = 'Sign in →';

  if (error) { showAlert('Error: ' + error.message); return; }
  if (!data || data.length === 0) {
    showAlert('No account found for this email. Please register.');
    // pre-fill register
    document.getElementById('r-email').value = email;
    setTimeout(() => show('register'), 1400);
    return;
  }
  const user = data[0];
  setSession(user, user.role === 'manager' ? 'manager' : 'reportee');
  location.href = 'role_select.html';
}

async function doRegister() {
  hideAlert();
  const name  = (document.getElementById('r-name').value  || '').trim();
  const email = (document.getElementById('r-email').value || '').trim().toLowerCase();
  const role  = document.getElementById('r-role').value;
  const mgrEmail = (document.getElementById('r-mgr').value || '').trim().toLowerCase();

  if (!name || !email) { showAlert('Name and email are required.'); return; }

  const btn = document.getElementById('r-btn');
  btn.disabled = true; btn.textContent = 'Registering…';

  // check duplicate
  const { data: existing } = await db.from('users').select('id').eq('email', email);
  if (existing && existing.length > 0) {
    btn.disabled = false; btn.textContent = 'Create account →';
    showAlert('Email already registered. Please sign in.');
    return;
  }

  let manager_id = null;
  if (mgrEmail) {
    const { data: mgr } = await db.from('users').select('id').eq('email', mgrEmail);
    if (!mgr || mgr.length === 0) {
      btn.disabled = false; btn.textContent = 'Create account →';
      showAlert('No manager found with email: ' + mgrEmail);
      return;
    }
    manager_id = mgr[0].id;
  }

  const { data: newU, error } = await db.from('users')
    .insert({ name, email, role, manager_id })
    .select();

  btn.disabled = false; btn.textContent = 'Create account →';
  if (error) { showAlert('Error: ' + error.message); return; }

  showAlert('Account created! Signing in…', 'ok');
  setTimeout(() => {
    setSession(newU[0], role === 'manager' ? 'manager' : 'reportee');
    location.href = 'role_select.html';
  }, 1000);
}
</script>
</body>
</html>
